version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: fruit-mongodb-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpass
      MONGO_INITDB_DATABASE: orderdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--username", "admin", "--password", "adminpass", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data: