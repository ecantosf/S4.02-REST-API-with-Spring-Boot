spring.application.name=fruit-order-api
server.port=8083

# MongoDB Configuration with authentication
spring.data.mongodb.uri=mongodb://admin:adminpass@localhost:27017/orderdb?authSource=admin
spring.data.mongodb.database=orderdb

# Connection settings
spring.data.mongodb.auto-index-creation=true

# Logging
logging.level.org.springframework.data.mongodb.core=DEBUG
logging.level.org.mongodb.driver=INFO