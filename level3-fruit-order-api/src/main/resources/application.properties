spring.application.name=fruit-order-api
server.port=8083

# MongoDB Configuration (with environment variables for production)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/orderdb}
spring.data.mongodb.database=${MONGODB_DATABASE:orderdb}

# Connection settings
spring.data.mongodb.auto-index-creation=true

# Logging
logging.level.org.springframework.data.mongodb.core=DEBUG
logging.level.org.mongodb.driver=INFO